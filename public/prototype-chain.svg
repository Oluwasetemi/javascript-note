<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#f8f9fa"/><text x="400" y="30" fill="#2c3e50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">JavaScript Prototype Chain</text><rect width="150" height="100" x="50" y="100" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/><text x="125" y="125" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Object Instance</text><text x="125" y="145" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">{ name: &quot;John&quot; }</text><text x="125" y="165" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">__proto__</text><text x="125" y="185" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">constructor</text><rect width="150" height="100" x="50" y="300" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="5"/><text x="125" y="325" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Constructor</text><text x="125" y="345" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">function Person()</text><text x="125" y="365" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">prototype</text><text x="125" y="385" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">constructor</text><rect width="150" height="100" x="325" y="100" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="5"/><text x="400" y="125" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Constructor.prototype</text><text x="400" y="145" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">{ constructor: Person }</text><text x="400" y="165" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">__proto__</text><text x="400" y="185" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">methods...</text><rect width="150" height="100" x="600" y="100" fill="#f39c12" stroke="#e67e22" stroke-width="2" rx="5"/><text x="675" y="125" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Object.prototype</text><text x="675" y="145" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">toString()</text><text x="675" y="165" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">valueOf()</text><text x="675" y="185" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">__proto__: null</text><rect width="150" height="60" x="600" y="300" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2" rx="5"/><text x="675" y="335" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">null</text><text x="675" y="350" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">(end of chain)</text><defs><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#2c3e50" points="0 0 10 3.5 0 7"/></marker></defs><line x1="200" x2="325" y1="150" y2="150" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/><text x="260" y="145" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">__proto__</text><line x1="475" x2="600" y1="150" y2="150" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/><text x="535" y="145" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">__proto__</text><line x1="675" x2="675" y1="200" y2="300" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/><text x="685" y="250" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12">__proto__</text><line x1="200" x2="325" y1="350" y2="175" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><text x="260" y="270" fill="#e74c3c" font-family="Arial, sans-serif" font-size="12">prototype</text><line x1="125" x2="125" y1="200" y2="300" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/><text x="135" y="250" fill="#3498db" font-family="Arial, sans-serif" font-size="12">constructor</text><text x="50" y="520" fill="#2c3e50" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Legend:</text><rect width="20" height="15" x="50" y="530" fill="#3498db"/><text x="80" y="542" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12">Object Instance</text><rect width="20" height="15" x="200" y="530" fill="#e74c3c"/><text x="230" y="542" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12">Constructor Function</text><rect width="20" height="15" x="380" y="530" fill="#9b59b6"/><text x="410" y="542" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12">Prototype Object</text><rect width="20" height="15" x="550" y="530" fill="#f39c12"/><text x="580" y="542" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12">Built-in Prototype</text></svg>